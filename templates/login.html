<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş - ArnecaTech</title>
    
    <style>
        /* ========== TEMEL AYARLAR ========== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(to bottom right, #111827, #000000);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* ========== GİRİŞ KARTI (GLASSMORPHISM) ========== */
        .login-card {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Safari desteği */
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 28rem;
        }

        /* ========== BAŞLIKLAR ========== */
        .header-text {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header-text h1 {
            font-size: 1.875rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .header-text p {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        /* ========== HATA MESAJI ========== */
        .error-box {
            background-color: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 0.25rem;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            text-align: center;
        }

        /* ========== FORM ELEMANLARI ========== */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group-large {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .form-label {
            display: block;
            color: #d1d5db;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative;
        }
        .form-input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid #4b5563;
            border-radius: 0.25rem;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease-in-out;
        }
        .form-input:focus {
            border-color: #3b82f6;
        }
        .form-input-password {
            padding-right: 2.5rem; /* Göz ikonu için boşluk */
        }

        /* ========== GÖZ İKONU BUTONU ========== */
        .toggle-password {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            padding-right: 0.75rem;
            display: flex;
            align-items: center;
            color: #9ca3af;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: color 0.2s ease-in-out;
        }
        .toggle-password:hover {
            color: #ffffff;
        }
        .toggle-password:focus {
            outline: none;
        }
        .toggle-password svg {
            height: 1.25rem;
            width: 1.25rem;
        }

        /* ========== UYARILAR VE GİZLEME ========== */
        .caps-warning {
            color: #facc15;
            font-size: 0.75rem;
            margin-top: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.025em;
        }
        .hidden {
            display: none !important;
        }

        /* ========== BUTON ========== */
        .submit-btn {
            width: 100%;
            background-color: #2563eb;
            color: #ffffff;
            font-weight: 700;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
            font-size: 1rem;
        }
        .submit-btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header-text">
            <h1>ArnecaTech</h1>
            <p>Medya İşleme Platformu</p>
        </div>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="form-group">
                <label class="form-label" for="username">Kullanıcı Adı</label>
                <input class="form-input" id="username" name="username" type="text" required>
            </div>
            
            <div class="form-group-large">
                <label class="form-label" for="password">Şifre</label>
                
                <div class="input-wrapper">
                    <input class="form-input form-input-password" id="password" name="password" type="password" required>
                    
                    <button type="button" id="togglePassword" class="toggle-password">
                        <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>

                <p id="capsWarning" class="caps-warning hidden">
                    DİKKAT: Caps Lock açık!
                </p>
            </div>
            
            <button class="submit-btn" type="submit">
                Giriş Yap
            </button>
        </form>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const capsWarning = document.getElementById('capsWarning');

        // 1. Şifre Göster / Gizle İşlemi
        togglePasswordBtn.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'text') {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                `;
            } else {
                eyeIcon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                `;
            }
        });

        // 2. Caps Lock Kontrol İşlemi
        function checkCapsLock(event) {
            if (event.getModifierState && event.getModifierState('CapsLock')) {
                capsWarning.classList.remove('hidden');
            } else {
                capsWarning.classList.add('hidden');
            }
        }

        passwordInput.addEventListener('keyup', checkCapsLock);
        passwordInput.addEventListener('keydown', checkCapsLock);
    </script>
</body>
</html>
